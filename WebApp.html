<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    :root {
      color-scheme: light;
      --surface-1:      #fcfcfb;
      --surface-2:      #f2f1ed;
      --page:           #f9f9f7;
      --text-primary:   #0b0b0b;
      --text-secondary: #52514e;
      --text-muted:     #898781;
      --grid:            #e1e0d9;
      --axis:           #c3c2b7;
      --border:         rgba(11,11,11,0.10);
      --accent:         #2a78d6;
      --series-student: #2a78d6;
      --series-avg:     #008300;
      --critical:       #d03b3b;
      --status-good:    #0ca30c;
      --status-good-bg: rgba(12,163,12,0.10);
      --status-warn:    #c98500;
      --status-warn-bg: rgba(250,178,25,0.16);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --surface-1:      #1a1a19;
        --surface-2:      #232322;
        --page:           #0d0d0d;
        --text-primary:   #ffffff;
        --text-secondary: #c3c2b7;
        --text-muted:     #898781;
        --grid:           #2c2c2a;
        --axis:           #383835;
        --border:         rgba(255,255,255,0.10);
        --accent:         #3987e5;
        --series-student: #3987e5;
        --series-avg:     #008300;
        --critical:       #e66767;
        --status-good:    #0ca30c;
        --status-good-bg: rgba(12,163,12,0.16);
        --status-warn:    #fab219;
        --status-warn-bg: rgba(250,178,25,0.14);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 26px 16px 56px;
      background: var(--page);
      color: var(--text-primary);
      font-family: system-ui, -apple-system, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }
    h1 { font-size: 25px; margin: 0 0 6px; }
    h2 { font-size: 15.5px; font-weight: 700; margin: 0 0 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .04em; }
    p.sub { color: var(--text-secondary); margin: 0 0 20px; font-size: 15.5px; line-height: 1.6; }
    .card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      max-width: 880px;
      margin: 0 auto 16px;
    }
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 13px; color: var(--text-secondary); }
    .field input {
      width: 96px; padding: 9px 10px; font-size: 16px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface-1); color: var(--text-primary);
    }
    button {
      padding: 10px 20px; font-size: 16px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      background: var(--accent); color: #fff;
    }
    button:disabled { opacity: .5; cursor: default; }
    .msg { font-size: 15px; color: var(--text-secondary); margin-top: 10px; }
    .msg.error { color: var(--critical); }

    .segmented { display: inline-flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 9px; padding: 3px; gap: 2px; }
    .segmented button {
      background: transparent; border: none; padding: 7px 14px; border-radius: 6px;
      font-size: 14px; font-weight: 600; color: var(--text-secondary); cursor: pointer;
    }
    .segmented button.active { background: var(--surface-1); color: var(--text-primary); }

    .charts { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
    .chart-box { flex: 1 1 380px; max-width: 420px; display: flex; flex-direction: column; align-items: center; }
    .chart-title { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 4px; }
    .legend { display: flex; gap: 18px; justify-content: center; font-size: 14px; color: var(--text-secondary); margin-top: 6px; }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .swatch { width: 11px; height: 11px; border-radius: 2px; display: inline-block; }

    .delta-strip { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 12px; max-width: 340px; }
    .delta-chip {
      display: inline-flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 600;
      border-radius: 999px; padding: 4px 10px 4px 6px; border: 1px solid var(--border);
    }
    .delta-chip .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
    .delta-chip.up { color: var(--status-good); background: var(--status-good-bg); }
    .delta-chip.up .dot { background: var(--status-good); }
    .delta-chip.down { color: var(--status-warn); background: var(--status-warn-bg); }
    .delta-chip.down .dot { background: var(--status-warn); }
    .delta-chip.flat { color: var(--text-muted); background: var(--surface-2); }
    .delta-chip.flat .dot { background: var(--text-muted); }

    .report-page.hidden-tab { display: none; }

    .tabs { display: flex; gap: 8px; margin: 22px 0 14px; border-bottom: 1px solid var(--border); }
    .tab-btn {
      background: transparent; border: none; border-bottom: 2px solid transparent;
      padding: 10px 4px; margin-bottom: -1px; font-size: 16px; font-weight: 700;
      color: var(--text-muted); cursor: pointer;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ---- 리포트 꾸밈 (기존 문구는 그대로 두고 카드/아이콘 스타일만 추가) ---- */
    .rpt-hero { text-align: center; padding: 2px 0 12px; }
    .rpt-hero-title { font-size: 23px; font-weight: 800; }
    .rpt-name-badge {
      display: inline-block; margin-top: 8px; padding: 5px 20px; border-radius: 999px;
      background: #ece4ff; color: #6b4fd1; font-size: 15px; font-weight: 700;
    }
    @media (prefers-color-scheme: dark) {
      .rpt-name-badge { background: #3a2f5c; color: #c9b8ff; }
    }
    .rpt-hero-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
    .rpt-charts-card {
      border-radius: 14px; padding: 14px 16px; margin-bottom: 14px;
      background: var(--surface-1); border: 1px solid var(--border);
    }
    .rpt-charts-card .charts { margin-bottom: 4px; }
    .rpt-stat-card {
      display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px;
      padding: 14px 16px; border-radius: 14px; background: #eaf2ff; border: 1px solid #cfe0ff;
    }
    @media (prefers-color-scheme: dark) { .rpt-stat-card { background: #1c2a44; border-color: #2c3f63; } }
    .rpt-stat-icon {
      flex: none; width: 38px; height: 38px; border-radius: 50%; background: #dbe8ff;
      display: flex; align-items: center; justify-content: center; font-size: 17px;
    }
    @media (prefers-color-scheme: dark) { .rpt-stat-icon { background: #28406b; } }
    .rpt-stat-card .narrative-intro, .rpt-stat-card .narrative-summary { margin: 0 0 8px; padding: 0; background: none; border: none; }
    .rpt-stat-card .narrative-summary:last-child { margin-bottom: 0; }
    .rpt-point-card.strong { background: #eafbf0; border-color: #c9f2d6; }
    .rpt-point-card.weak { background: #fff8e8; border-color: #ffe8b3; }
    @media (prefers-color-scheme: dark) {
      .rpt-point-card.strong { background: #163524; border-color: #1f5236; }
      .rpt-point-card.weak { background: #3a3013; border-color: #5c4b17; }
    }
    .rpt-point-card.strong .pill.good { background: #d7f5df; color: #1f7a41; }
    .rpt-point-card.weak .pill.warn { background: #ffedc2; color: #92600a; }
    .rpt-closing-bar { background: #fff9e0; border-color: #ffe9a8; }
    @media (prefers-color-scheme: dark) { .rpt-closing-bar { background: #3a3410; border-color: #574c14; } }

    .narrative-intro { font-size: 15.5px; line-height: 1.75; color: var(--text-secondary); margin: 0 0 16px; }
    .narrative-summary { font-size: 15.5px; line-height: 1.7; margin: 0 0 16px; padding: 12px 16px; border-radius: 10px; background: var(--surface-2); border: 1px solid var(--border); }
    .narrative-summary strong { color: var(--text-primary); }
    .point-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .point-card { border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; background: var(--surface-2); }
    .point-card .pill {
      display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 700;
      border-radius: 999px; padding: 4px 11px; margin-bottom: 9px;
    }
    .pill.good { color: var(--status-good); background: var(--status-good-bg); }
    .pill.warn { color: var(--status-warn); background: var(--status-warn-bg); }
    .point-card .point-title { font-size: 16px; font-weight: 700; margin: 0 0 5px; }
    .point-card .point-desc { font-size: 13.5px; color: var(--text-muted); margin: 0 0 9px; line-height: 1.55; }
    .point-card .point-tip { font-size: 15px; color: var(--text-primary); line-height: 1.65; margin: 0; }
    .point-card .point-mission { font-size: 14px; color: var(--text-primary); line-height: 1.6; margin: 8px 0 0; padding-top: 8px; border-top: 1px dashed var(--border); }
    .point-card .point-mission strong { color: var(--accent); }
    .point-card .point-score { font-size: 12.5px; color: var(--text-muted); margin-top: 10px; }

    .closing-note {
      margin-top: 16px; padding: 16px 18px; border-radius: 10px;
      background: var(--status-good-bg); border: 1px solid var(--border); font-size: 15px; line-height: 1.75;
    }
    .closing-note .mt-title { margin: 0 0 8px; font-weight: 700; }
    .closing-note .mt-p { margin: 0 0 8px; }
    .closing-note .mt-list { margin: 0 0 8px; padding-left: 18px; line-height: 1.6; }
    .closing-note .mt-final { margin: 0; }
    .home-guide { margin-top: 16px; }
    .home-guide h3 { font-size: 14.5px; margin: 0 0 8px; color: var(--text-secondary); }
    .home-guide ul { margin: 0; padding-left: 18px; display: flex; flex-direction: column; gap: 9px; }
    .home-guide li { font-size: 15px; line-height: 1.65; }

    .toggle-table { text-align: center; margin-top: 18px; }
    .toggle-table button { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 9px 18px; font-size: 14.5px; }
    table { width: 100%; border-collapse: collapse; margin-top: 14px; font-size: 14.5px; }
    th, td { padding: 8px 10px; text-align: center; border-bottom: 1px solid var(--grid); }
    th { color: var(--text-secondary); font-weight: 600; font-size: 13.5px; }
    td:first-child, th:first-child { text-align: left; color: var(--text-secondary); }
    td.gap-up { color: var(--status-good); font-weight: 700; }
    td.gap-down { color: var(--status-warn); font-weight: 700; }
    .hidden { display: none; }
    .axis-label { font-size: 12.5px; fill: var(--text-secondary); }
    .grid-line { stroke: var(--grid); fill: none; }
    .axis-line { stroke: var(--axis); }

    .print-bar { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 26px; }
    .print-bar .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .print-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 26px; font-size: 15.5px; font-weight: 700;
      border-radius: 10px; border: none; cursor: pointer;
    }
    .print-btn.primary { background: var(--accent); color: #fff; }
    .print-btn.secondary { background: var(--surface-2); color: var(--text-primary); border: 1px solid var(--border); }
    .print-hint { font-size: 12.5px; color: var(--text-muted); text-align: center; max-width: 46ch; line-height: 1.6; }
    .print-only { display: none; }

    @media (max-width: 640px) { .point-grid { grid-template-columns: 1fr; } }

    @media print {
      @page { size: A4; margin: 10mm; }
      body { background: #fff; padding: 0; }
      :root {
        --page: #ffffff; --surface-1: #ffffff; --surface-2: #f5f5f3;
        --text-primary: #0b0b0b; --text-secondary: #3a3a38; --text-muted: #66655f;
        --border: rgba(11,11,11,0.14); color-scheme: light;
      }
      .card { border: none; border-radius: 0; padding: 0; box-shadow: none; max-width: 100%; }
      body > .card:first-of-type, #scope-toggle, .form-row .segmented, .toggle-table, .print-bar,
      #scope-toggle-row, .tabs { display: none !important; }
      .print-only { display: block; }
      .point-card, .chart-box, .narrative-summary, .closing-note { break-inside: avoid; }
      .charts { break-inside: avoid; }
      table, #table-view { display: none !important; }

      .report-page .rpt-hero { padding: 0 0 6px; }
      .report-page .rpt-hero-title { font-size: 17px; }
      .report-page .rpt-name-badge { padding: 3px 14px; font-size: 12px; margin-top: 4px; }
      .report-page .rpt-hero-sub { font-size: 9.5px; margin-top: 3px; }
      .report-page .rpt-charts-card { padding: 8px 10px; margin-bottom: 8px; }
      .report-page .rpt-stat-card { padding: 8px 10px; margin-bottom: 8px; gap: 8px; }
      .report-page .rpt-stat-icon { width: 26px; height: 26px; font-size: 13px; }
      .report-page .charts { flex-wrap: nowrap; gap: 8px; }
      .report-page .chart-box { flex: 1 1 0; max-width: 48%; min-width: 0; }
      .report-page .chart-box .chart-title { font-size: 13px; margin-bottom: 0; }
      .report-page .chart-box svg { max-width: 150px; }
      .report-page .legend { font-size: 11px; gap: 12px; margin-top: 2px; margin-bottom: 6px; }
      .report-page .narrative-intro { font-size: 12px; line-height: 1.42; margin-bottom: 5px; }
      .report-page .narrative-summary { font-size: 11.5px; line-height: 1.4; padding: 6px 10px; margin-bottom: 7px; }
      .report-page .point-grid { gap: 7px; }
      .report-page .point-card { padding: 7px 9px; }
      .report-page .point-card .pill { font-size: 10.5px; padding: 3px 8px; margin-bottom: 5px; }
      .report-page .point-card .point-title { font-size: 12.5px; margin-bottom: 3px; }
      .report-page .point-card .point-desc { font-size: 10.5px; margin-bottom: 4px; line-height: 1.35; }
      .report-page .point-card .point-tip { font-size: 11.5px; line-height: 1.38; }
      .report-page .point-card .point-mission { font-size: 11px; margin-top: 4px; padding-top: 4px; }
      .report-page .point-card .point-score { font-size: 10px; margin-top: 4px; }
      .report-page .closing-note { font-size: 11px; line-height: 1.38; padding: 7px 10px; margin-top: 7px; }
      .report-page .closing-note .mt-title { margin-bottom: 4px; }
      .report-page .closing-note .mt-p { margin-bottom: 4px; }
      .report-page .closing-note .mt-list { margin-bottom: 4px; padding-left: 14px; line-height: 1.35; }
      .report-page .closing-note .mt-list li { margin-bottom: 2px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>독서 진단 결과 조회</h1>
    <p class="sub">학년 · 반 · 번호를 입력하면 나의 진단 그래프를 볼 수 있어요.</p>
    <div class="form-row">
      <div class="field"><label>학년</label><input id="in-grade" inputmode="numeric" value="<?= prefillGrade ?>"></div>
      <div class="field"><label>반</label><input id="in-class" inputmode="numeric" value="<?= prefillClass ?>"></div>
      <div class="field"><label>번호</label><input id="in-number" inputmode="numeric" value="<?= prefillNumber ?>"></div>
      <button id="btn-search">결과 보기</button>
    </div>
    <div id="msg" class="msg"></div>
  </div>

  <div style="text-align:center; margin-top:-6px;">
    <a href="https://script.google.com/macros/s/AKfycbw9Sgm3nbS4BY-mfdrWuUf5aij7ms-dOblMmuAGeD1XEy5GDJ6KrhYV1FgonJSrQMgFWA/exec?view=admin" target="_top" style="font-size:12.5px; color:var(--text-muted);">교사용 관리자 대시보드</a>
  </div>

  <div id="result" class="card hidden">
    <div id="scope-toggle-row" class="form-row" style="justify-content:center; margin-bottom:16px;">
      <span style="font-size:14px; color:var(--text-secondary);">비교 대상</span>
      <div class="segmented" id="scope-toggle">
        <button data-scope="all" class="active">전체 평균</button>
        <button data-scope="grade">같은 학년 평균</button>
        <button data-scope="class">같은 반 평균</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="student">학생용 리포트</button>
      <button class="tab-btn" data-tab="parent">학부모용 리포트</button>
    </div>

    <div id="page-student" class="report-page">
      <div id="rpt-body-student"></div>
    </div>

    <div id="page-parent" class="report-page hidden-tab">
      <div id="rpt-body-parent"></div>
    </div>

    <div class="toggle-table">
      <button id="btn-toggle-table">표로 보기</button>
    </div>
    <table id="table-view" class="hidden"></table>

    <div class="print-bar">
      <div class="btn-row">
        <button id="btn-print-student" class="print-btn primary">🖨️ 학생용 리포트 인쇄/저장</button>
        <button id="btn-print-parent" class="print-btn secondary">🖨️ 학부모용 리포트 인쇄/저장</button>
      </div>
      <div class="print-hint">각 버튼을 누르면 <strong>해당 리포트 1장(A4 1쪽)만</strong> 출력돼요. "PDF로 저장"하려면 인쇄 대화상자에서 대상(프린터)을 <strong>"PDF로 저장"</strong>으로 선택하면 됩니다. 파일 이름은 이름·학년·반·번호로 자동으로 채워져 있어요.</div>
    </div>
  </div>

  <script>
    const SCALE_MIN = <?= scaleMin ?>;
    const SCALE_MAX = <?= scaleMax ?>;
    let lastReport = null;
    let currentScope = 'all';
    let currentTab = 'student';
    const ORIGINAL_TITLE = document.title;

    // ---------- 영역/하위영역 안내 문구 (학생용 · 학부모용) ----------
    const AREA_INFO = {
      'Ⅰ': {
        label: '독서흥미와 몰입', desc: '책을 읽는 순간 자체를 즐기고 몰입하는 힘이에요.',
        student: '재미있어 보이는 책을 마음대로 골라 편하게 읽는 시간을 늘려보세요. 완독 부담 없이 그림이 많거나 좋아하는 주제의 책부터 시작해도 좋아요.',
        parent: '완독이나 학습 목적을 강조하기보다 아이가 흥미를 느끼는 주제(만화, 그림책, 좋아하는 시리즈 등)부터 자유롭게 고르도록 허용해 주세요. 부모가 먼저 즐겁게 책을 읽는 모습을 보여주는 것도 큰 도움이 됩니다.',
        studentMission: '이번 주: 표지만 보고 끌리는 책 1권을 골라 10쪽만 가볍게 읽어보기',
        parentMission: '이번 주: 집에 있는 책 중 아이가 표지만 보고 3권을 직접 골라보게 하고 왜 골랐는지 물어보기',
      },
      'Ⅱ': {
        label: '독서주도성과 소통', desc: '스스로 책을 고르고 읽는 힘, 그리고 읽은 내용을 다른 사람과 나누는 힘이에요.',
        student: '이번엔 내가 직접 읽고 싶은 책을 골라보고, 다 읽은 후엔 가족이나 친구에게 어떤 이야기였는지 짧게 소개해보세요.',
        parent: '아이가 직접 책을 고르도록 기회를 주시고, 식사 시간 등에 "오늘 읽은 책 어땠어?"라고 자연스럽게 물어봐 주세요. 정답을 요구하지 않는 편안한 대화가 소통 능력을 키웁니다.',
        studentMission: '이번 주: 내가 고른 책 1권을 다 읽고 가족에게 1분 동안 소개해보기',
        parentMission: '이번 주: 저녁 식사 시간에 "오늘 읽은 책 한 줄 소개" 대화를 3번 나누기',
      },

    // ---- 방사형(레이더) 차트: 순수 SVG로 그림 ----
    function css(varName) {
      return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    }

    function buildRadar(container, labels, seriesA, seriesB, min, max) {
      container.innerHTML = '';
      const size = 320, cx = size / 2, cy = size / 2, r = size / 2 - 46;
      const n = labels.length;
      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('viewBox', '0 0 ' + size + ' ' + size);
      svg.setAttribute('width', '100%');
      svg.style.overflow = 'visible';

      function point(i, value) {
        const angle = -Math.PI / 2 + (2 * Math.PI * i) / n;
        const ratio = Math.max(0, Math.min(1, (value - min) / (max - min)));
        const rad = r * ratio;
        return [cx + rad * Math.cos(angle), cy + rad * Math.sin(angle)];
      }

      const rings = 4;
      for (let ring = 1; ring <= rings; ring++) {
        const ratio = ring / rings;
        const pts = [];
        for (let i = 0; i < n; i++) {
          const angle = -Math.PI / 2 + (2 * Math.PI * i) / n;
          pts.push((cx + r * ratio * Math.cos(angle)) + ',' + (cy + r * ratio * Math.sin(angle)));
        }
        const poly = document.createElementNS(svgNS, 'polygon');
        poly.setAttribute('points', pts.join(' '));
        poly.setAttribute('class', 'grid-line');
        svg.appendChild(poly);
      }

      for (let i = 0; i < n; i++) {
        const angle = -Math.PI / 2 + (2 * Math.PI * i) / n;
        const x2 = cx + r * Math.cos(angle), y2 = cy + r * Math.sin(angle);
        const line = document.createElementNS(svgNS, 'line');
        line.setAttribute('x1', cx); line.setAttribute('y1', cy);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('class', 'axis-line');
        svg.appendChild(line);

        const lx = cx + (r + 22) * Math.cos(angle), ly = cy + (r + 22) * Math.sin(angle);
        const text = document.createElementNS(svgNS, 'text');
        text.setAttribute('x', lx); text.setAttribute('y', ly);
        text.setAttribute('text-anchor', Math.abs(Math.cos(angle)) < 0.15 ? 'middle' : (Math.cos(angle) > 0 ? 'start' : 'end'));
        text.setAttribute('dominant-baseline', 'middle');
        text.setAttribute('class', 'axis-label');
        text.textContent = labels[i];
        svg.appendChild(text);
      }

      function drawSeries(values, colorVar, opacity) {
        const pts = values.map((v, i) => point(i, v == null ? min : v));
        const poly = document.createElementNS(svgNS, 'polygon');
        poly.setAttribute('points', pts.map(p => p.join(',')).join(' '));
        poly.setAttribute('fill', css(colorVar));
        poly.setAttribute('fill-opacity', opacity);
        poly.setAttribute('stroke', css(colorVar));
        poly.setAttribute('stroke-width', '2');
        svg.appendChild(poly);
        pts.forEach((p, i) => {
          const c = document.createElementNS(svgNS, 'circle');
          c.setAttribute('cx', p[0]); c.setAttribute('cy', p[1]); c.setAttribute('r', 3.5);
          c.setAttribute('fill', css(colorVar));
          const title = document.createElementNS(svgNS, 'title');
          title.textContent = labels[i] + ': ' + (values[i] == null ? '-' : values[i].toFixed(1));
          c.appendChild(title);
          svg.appendChild(c);
        });
      }

      drawSeries(seriesB, '--series-avg', 0.12);
      drawSeries(seriesA, '--series-student', 0.18);

      container.appendChild(svg);
    }

    function fmt(v) { return v == null ? '-' : v.toFixed(1); }
    function gapClass(gap) { return gap > 0.05 ? 'gap-up' : gap < -0.05 ? 'gap-down' : ''; }
    function gapText(gap) { return (gap > 0 ? '+' : '') + gap.toFixed(1); }

    function currentAvg() {
      const scope = lastReport.scopes[currentScope];
      return { area: scope.area, category: scope.category, label: scope.label, count: scope.count };
    }

    function renderTable(report) {
      const avg = currentAvg();
      const rows = ['<tr><th>영역</th><th>나의 점수</th><th>' + avg.label + '</th><th>차이</th></tr>'];
      report.areaLabels.forEach((label, i) => {
        const s = report.studentArea[i], v = avg.area[i], gap = (s != null && v != null) ? s - v : null;
        rows.push('<tr><td>' + label + '</td><td>' + fmt(s) + '</td><td>' + fmt(v) + '</td><td class="' + (gap == null ? '' : gapClass(gap)) + '">' + (gap == null ? '-' : gapText(gap)) + '</td></tr>');
      });
      report.categoryLabels.forEach((label, i) => {
        const s = report.studentCategory[i], v = avg.category[i], gap = (s != null && v != null) ? s - v : null;
        rows.push('<tr><td>' + label + '</td><td>' + fmt(s) + '</td><td>' + fmt(v) + '</td><td class="' + (gap == null ? '' : gapClass(gap)) + '">' + (gap == null ? '-' : gapText(gap)) + '</td></tr>');
      });
      document.getElementById('table-view').innerHTML = rows.join('');
    }

    // ---------- 강점/성장 포인트 분석 (대영역 + 하위영역을 합쳐 딱 1개씩만 뽑는다) ----------
    function infoFor(item) {
      return item.type === 'area' ? AREA_INFO[item.key] : CATEGORY_INFO[item.key];
    }

    function analyzeGaps(report, avg) {
      const areaItems = report.areaKeys.map((key, i) => ({
        type: 'area', key, label: report.areaLabels[i],
        score: report.studentArea[i], avg: avg.area[i],
      }));
      const catItems = report.categoryLabels.map((key, i) => ({
        type: 'category', key, label: key,
        score: report.studentCategory[i], avg: avg.category[i],
      }));
      const combined = areaItems.concat(catItems)
        .filter(r => r.score != null && r.avg != null)
        .map(r => Object.assign(r, { gap: r.score - r.avg }))
        .sort((x, y) => x.gap - y.gap);
      const aboveCount = combined.filter(r => r.gap > 0.05).length;
      return {
        weak: combined[0], strong: combined[combined.length - 1],
        totalCount: combined.length, aboveCount,
      };
    }

    function pointCard(kind, title, desc, tip, mission, score, avgScore, showScore) {
      const pillClass = kind === 'strong' ? 'good' : 'warn';
      const pillLabel = kind === 'strong' ? '잘하고 있어요 (강점)' : '함께 채워봐요 (성장 포인트)';
      return '' +
        '<div class="point-card rpt-point-card ' + kind + '">' +
          '<span class="pill ' + pillClass + '">' + pillLabel + '</span>' +
          '<p class="point-title">' + title + '</p>' +
          '<p class="point-desc">' + desc + '</p>' +
          '<p class="point-tip">' + tip + '</p>' +
          (mission ? '<p class="point-mission"><strong>' + (kind === 'strong' ? '계속 이렇게 →' : '이번 주 미션 →') + '</strong> ' + mission + '</p>' : '') +
          (showScore ? '<p class="point-score">' + fmt(score) + '점 · 비교 평균 ' + fmt(avgScore) + '점 (5점 만점, 차이 ' + gapText(score - avgScore) + ')</p>' : '') +
        '</div>';
    }

        '<div class="rpt-stat-card"><div class="rpt-stat-icon">📊</div><div class="rpt-stat-text">' +
          '<p class="narrative-intro">자녀(' + name + ')의 독서 사전 진단 결과입니다. ' + avg.label + '과 비교한 강점과 보완이 필요한 부분을 확인하시고, 가정에서의 독서 지도에 참고해 주세요.</p>' +
          '<p class="narrative-summary">📊 5개 대영역과 6개 읽기 기능 중 <strong>' + g.aboveCount + '개 / ' + g.totalCount + '개</strong>가 ' + avg.label + '보다 높은 결과를 보였습니다. 아래에 강점과 보완이 필요한 부분, 가정에서의 실천 방법을 안내드립니다.</p>' +
        '</div></div>' +
        '<div class="point-grid">' +
          pointCard('strong', '강점 ' + strongLabel + ': ' + g.strong.label, strongInfo.desc, strongInfo.parent, null, g.strong.score, g.strong.avg, true) +
          pointCard('weak', '보완 ' + weakLabel + ': ' + g.weak.label, weakInfo.desc, weakInfo.parent, weakInfo.parentMission, g.weak.score, g.weak.avg, true) +
        '</div>' +
        '<div class="closing-note rpt-closing-bar">' +
          '<p class="mt-title">🧭 가정에서 함께: 독서 미션지로 메타인지 키우기</p>' +
          '<p class="mt-p">여름방학 독서 미션지(읽기 전 · 읽으며 · 읽은 후)는 아이가 독서 목적을 분명히 하고 생각을 점검하는 메타인지 훈련에 좋은 도구예요. 책마다 할 수 있는 미션이 달라 7개 중 3개만 해도 충분하고 정답은 없으니, 가정의 어른께서 도구 없이 아래처럼 편하게 함께 봐주세요.</p>' +
          '<ul class="mt-list">' +
            '<li><strong>읽기 전:</strong> "이 책, 무슨 이야기일 것 같아?" — 표지만 보고 상상해보게 해주세요.</li>' +
            '<li><strong>읽는 중, 오늘의 포인트(' + weakLabel + ': ' + g.weak.label + '):</strong> ' + weakInfo.parent + '</li>' +
            '<li><strong>읽은 후:</strong> 아이가 적은 내용을 같이 읽고 "이거 어떻게 알아냈어?"처럼 대견해하며 물어봐 주세요.</li>' +
          '</ul>' +
          '<p class="mt-final">이번 여름방학 미션이 2학기 교과 독서 향상으로 이어질 수 있도록 꾸준히 관심 가져주세요. 정답을 찾기보다 아이 스스로 생각하는 과정을 인정해 주시는 것이 독서 욕구를 키우는 가장 쉬운 방법입니다.</p>' +
        '</div>';
    }

    function renderAll() {
      const report = lastReport;
      const avg = currentAvg();
      renderNarrative(report); // 차트를 담을 빈 컨테이너를 포함한 리포트 DOM을 먼저 만든다
      buildRadar(document.getElementById('chart-area-student'), report.areaLabels, report.studentArea, avg.area, SCALE_MIN, SCALE_MAX);
      buildRadar(document.getElementById('chart-category-student'), report.categoryLabels, report.studentCategory, avg.category, SCALE_MIN, SCALE_MAX);
      buildRadar(document.getElementById('chart-area-parent'), report.areaLabels, report.studentArea, avg.area, SCALE_MIN, SCALE_MAX);
      buildRadar(document.getElementById('chart-category-parent'), report.categoryLabels, report.studentCategory, avg.category, SCALE_MIN, SCALE_MAX);
      document.getElementById('avg-legend-label-student').lastChild.textContent = avg.label;
      document.getElementById('avg-legend-label-parent').lastChild.textContent = avg.label;
      renderTable(report);

      const name = report.name || (report.grade + '학년 ' + report.cls + '반 ' + report.number + '번');
      const printDate = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
      const subline = name + ' · 비교 기준: ' + avg.label + ' · 출력일 ' + printDate;
      document.getElementById('print-subline-student').textContent = subline;
      document.getElementById('print-subline-parent').textContent = subline;
    }

    function search() {
      const grade = document.getElementById('in-grade').value.trim();
      const cls = document.getElementById('in-class').value.trim();
      const number = document.getElementById('in-number').value.trim();
      const msg = document.getElementById('msg');
      const result = document.getElementById('result');
      msg.textContent = ''; msg.classList.remove('error');

      if (!grade || !cls || !number) {
        msg.textContent = '학년, 반, 번호를 모두 입력해 주세요.';
        msg.classList.add('error');
        return;
      }
      document.getElementById('btn-search').disabled = true;
      msg.textContent = '조회 중...';

      google.script.run
        .withSuccessHandler(function (report) {
          document.getElementById('btn-search').disabled = false;
          if (!report.found) {
            msg.textContent = '해당 학년/반/번호의 응답을 찾을 수 없습니다. (현재까지 응답 ' + report.count + '건)';
            msg.classList.add('error');
            result.classList.add('hidden');
            return;
          }
          msg.textContent = '현재까지 응답 ' + report.count + '건이 반영되어 있습니다.';
          result.classList.remove('hidden');
          lastReport = report;
          currentScope = 'all';
          document.querySelectorAll('#scope-toggle button').forEach(b => b.classList.toggle('active', b.dataset.scope === 'all'));
          showTab('student');
          renderAll();
        })
        .withFailureHandler(function (err) {
          document.getElementById('btn-search').disabled = false;
          msg.textContent = '오류가 발생했습니다: ' + err.message;
          msg.classList.add('error');
        })
        .getStudentReport(grade, cls, number);
    }

    document.getElementById('btn-search').addEventListener('click', search);
    document.getElementById('btn-toggle-table').addEventListener('click', function () {
      document.getElementById('table-view').classList.toggle('hidden');
    });
    // ---------- 인쇄 / PDF 저장 (파일명 자동 채우기) ----------
    function printFileName(tab) {
      if (!lastReport) return ORIGINAL_TITLE;
      const namePart = lastReport.name ? lastReport.name + '_' : '';
      const audience = tab === 'parent' ? '학부모용' : '학생용';
      return namePart + lastReport.grade + '학년' + lastReport.cls + '반' + lastReport.number + '번_' + audience + '_독서진단리포트';
    }

    function showTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.getElementById('page-student').classList.toggle('hidden-tab', tab !== 'student');
      document.getElementById('page-parent').classList.toggle('hidden-tab', tab !== 'parent');
    }

    function triggerPrint(tab) {
      if (!lastReport) return;
      showTab(tab);
      document.title = printFileName(tab);
      window.print();
      var restore = function () { document.title = ORIGINAL_TITLE; window.removeEventListener('afterprint', restore); };
      window.addEventListener('afterprint', restore);
      setTimeout(restore, 15000);
    }

    document.getElementById('btn-print-student').addEventListener('click', function () { triggerPrint('student'); });
    document.getElementById('btn-print-parent').addEventListener('click', function () { triggerPrint('parent'); });
    document.getElementById('scope-toggle').addEventListener('click', function (e) {
      const btn = e.target.closest('button[data-scope]');
      if (!btn || !lastReport) return;
      currentScope = btn.dataset.scope;
      this.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
      renderAll();
    });
    document.querySelector('.tabs').addEventListener('click', function (e) {
      const btn = e.target.closest('.tab-btn');
      if (!btn || !lastReport) return;
      showTab(btn.dataset.tab);
    });
    [ 'in-grade', 'in-class', 'in-number' ].forEach(function (id) {
      document.getElementById(id).addEventListener('keydown', function (e) {
        if (e.key === 'Enter') search();
      });
    });

    // 관리자 대시보드에서 "보기" 링크로 들어온 경우, 학년/반/번호가 이미 채워져 있으면 자동 조회
    if (document.getElementById('in-grade').value && document.getElementById('in-class').value && document.getElementById('in-number').value) {
      search();
    }
  </script>
</body>
</html>
